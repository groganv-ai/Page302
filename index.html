<!DOCTYPE html>

<html>

<head>

    <title>PAGE 302</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<!-- PAGE HEADER -->

<div class="pageHeader">

    <div class="headerTop">

        <div class="headerInfo">

            <span class="pageNumber">P302</span>

            <span class="serviceName">VGGFAX 302</span>

            <span class="pageDescription">
                THE TELETEXT FOOTBALL GAME
            </span>

        </div>

        <div class="buildLabel">

            DEMO BUILD v3.5.04

        </div>

    </div>

<div class="headerLogo">

    <img
        src="assets/page302-logo.png"
        alt="PAGE302 Logo"
        class="pageLogo"
    >

</div>

</div>
    <!-- FORMATION / SCORE -->

 <div class="statusBar">

    <div id="formationDisplay">

        FORMATION : 4-4-2

    </div>

    <div id="scoreDisplay">

        SCORE : 0

    </div>

    <div id="guessDisplay">

        GUESSES : 0

    </div>

</div>

<!-- LEGEND ROW -->

<div class="legendRow">

    <div class="legendPanel">

        <div class="legendTitle">
            RARITY
        </div>

        <div class="legendContent">

            <span class="rarityUni">UNI</span>

            >

            <span class="raritySub">SUB</span>

            >

            <span class="rarityUtl">UTL</span>

            >

            <span class="rarityEng">ENG</span>

            >

            <span class="rarityLeg">LEG</span>

        </div>

    </div>

    <div class="legendPanel">

        <div class="legendTitle">
            CLUB BONUS
        </div>

        <div class="legendContent">

            <span class="rarityUni">1st</span>

            >

            <span class="raritySub">2nd</span>

            >

            <span class="rarityUtl">3rd</span>

            >

            <span class="rarityEng">4th</span>

            >

            <span class="rarityLeg">5th+</span>

        </div>

    </div>

</div>

    <!-- MAIN PLAY AREA -->

    <div class="mainLayout">

        <!-- LEFT -->

        <div class="panel">

 <div class="panelHeader">

    SQUAD

</div>

    <div id="squadBoard">

       Loading Squad...

    </div>

        </div>


        <!-- RIGHT -->

        <div class="panel">

         <div class="panelHeader">

    TARGET CLUBS

</div>
            <div id="clubTitle">

                Loading Club...

            </div>

        </div>

    </div>

<!-- ANSWER BAR -->

    <div class="inputArea">

  <div class="inputLeft">

    <div class="answerRow">

        <label>ANSWER :</label>

        <input
            type="text"
            id="answer"
            autocomplete="off"
            placeholder="POS Surname Club"
        >

    </div>

    <button onclick="submitAnswer()">
        SUBMIT
    </button>

</div>

        <div class="inputRight">

            <pre id="result">

Nothing submitted yet.

            </pre>

        </div>

    </div>


    <!-- FOOTER -->

<div class="footerBar">

    <div>HELP</div>

    <div>SCORES</div>

    <div>ABOUT</div>

    <div>NEW GAME</div>

</div>


    <script src="script.js"></script>

</body>

</html>
